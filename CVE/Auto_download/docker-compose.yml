name: "auto-downloader"

services:
  app:
    build: .
    ports:
      - "8001:8000"
    restart: unless-stopped
    networks:
      - redis-mini-storage-network

  mongo-express:
    image: mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://host.docker.internal:27017/
      ME_CONFIG_BASICAUTH_USERNAME: "admin"
      ME_CONFIG_BASICAUTH_PASSWORD: "123"
    restart: unless-stopped
    networks:
      - redis-mini-storage-network

networks:
  redis-mini-storage-network:
    external: true